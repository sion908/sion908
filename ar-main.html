<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>XR Live Card - 8th Wall</title>
    <link rel="icon" href="img/marure.ico">
    <link rel="stylesheet" href="css/ar.css">

    <!-- 8th Wall Open Source A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/8frame@latest/dist/8frame.min.js"></script>

    <!-- 8th Wall XR Extras -->
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@latest/dist/xrextras.js"></script>

    <!-- 8th Wall XR Engine -->
    <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrweb@latest/dist/xrweb.js"></script>

    <!-- A-Frame Extras -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <!-- Custom components -->
    <script src="js/ar-components.js"></script>
</head>
<body style="margin: 0px; overflow: hidden;">

<a-scene
    xrextras-generate-image-targets="primitive: stage-display"
    xrextras-loading
    xrextras-runtime-error
    renderer="antialias: true; colorManagement: true;"
    xrweb="disableWorldTracking: true">

    <a-assets>
        <a-asset-item id="mar" src="model/mar.gltf"></a-asset-item>
        <img id="stage-banner-img" src="img/stage-banner.png">
    </a-assets>

    <a-camera
        id="camera"
        position="0 4 10"
        raycaster="objects: .cantap"
        cursor="fuse:false; rayOrigin:mouse;">
    </a-camera>
    
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="spot" intensity="1.2" angle="38" penumbra="0.3" decay="2" target="#dancer"
              position="-1.4 1.8 1.2"
              rotation="-55 25 -10"></a-light>
    <a-light type="spot" intensity="1.2" angle="38" penumbra="0.3" decay="2" target="#dancer"
              position="1.4 1.8 1.2"
              rotation="-55 -25 10"></a-light>
</a-scene>

<button class="btn-transition" onclick="location.href='index.html'">ポートフォリオへ</button>
</body>
</html>
