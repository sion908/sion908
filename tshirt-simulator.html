<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tシャツシミュレーター</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            padding: 30px 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-top: 20px;
        }

        .canvas-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }

        #renderCanvas {
            width: 100%;
            height: 600px;
            display: block;
            touch-action: none;
        }

        .controls-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-height: 600px;
            overflow-y: auto;
        }

        .control-section {
            margin-bottom: 30px;
        }

        .control-section h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .color-picker-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .color-option {
            width: 100%;
            aspect-ratio: 1;
            border: 3px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.active {
            border-color: #333;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .image-upload-section {
            margin-bottom: 20px;
        }

        .upload-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .preview-image {
            margin-top: 10px;
            max-width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            display: none;
        }

        .preview-image.show {
            display: block;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .checkbox-container input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-container label {
            cursor: pointer;
            user-select: none;
        }

        .reset-button {
            width: 100%;
            padding: 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .controls-panel {
                max-height: none;
            }

            h1 {
                font-size: 2rem;
            }
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #667eea;
            font-size: 1.2rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 3D Tシャツシミュレーター</h1>
            <p class="subtitle">オリジナルデザインのTシャツを作ろう</p>
        </header>

        <div class="main-content">
            <div class="canvas-container">
                <div class="loading" id="loading">読み込み中...</div>
                <canvas id="renderCanvas"></canvas>
            </div>

            <div class="controls-panel">
                <div class="control-section">
                    <h3>🎨 Tシャツの色</h3>
                    <div class="color-picker-container">
                        <div class="color-option active" style="background-color: #ffffff;" data-color="#ffffff" title="ホワイト"></div>
                        <div class="color-option" style="background-color: #000000;" data-color="#000000" title="ブラック"></div>
                        <div class="color-option" style="background-color: #ff6b6b;" data-color="#ff6b6b" title="レッド"></div>
                        <div class="color-option" style="background-color: #4ecdc4;" data-color="#4ecdc4" title="ターコイズ"></div>
                        <div class="color-option" style="background-color: #45b7d1;" data-color="#45b7d1" title="ブルー"></div>
                        <div class="color-option" style="background-color: #f9ca24;" data-color="#f9ca24" title="イエロー"></div>
                        <div class="color-option" style="background-color: #6c5ce7;" data-color="#6c5ce7" title="パープル"></div>
                        <div class="color-option" style="background-color: #00b894;" data-color="#00b894" title="グリーン"></div>
                    </div>
                </div>

                <div class="control-section">
                    <h3>🖼️ 画像設定</h3>
                    
                    <div class="checkbox-container">
                        <input type="checkbox" id="useSameImage" checked>
                        <label for="useSameImage">全ての箇所に同じ画像を使用</label>
                    </div>
                    
                    <div class="checkbox-container">
                        <input type="checkbox" id="useSameSideImage" checked>
                        <label for="useSameSideImage">左右の側面に同じ画像を使用</label>
                    </div>

                    <div class="image-upload-section">
                        <label class="upload-label">胸の画像</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="frontImage" accept="image/*">
                            <label for="frontImage" class="file-input-label">📁 画像を選択</label>
                        </div>
                        <img id="frontPreview" class="preview-image" alt="胸画像プレビュー">
                    </div>

                    <div class="image-upload-section" id="backSection">
                        <label class="upload-label">背面の画像</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="backImage" accept="image/*">
                            <label for="backImage" class="file-input-label">📁 画像を選択</label>
                        </div>
                        <img id="backPreview" class="preview-image" alt="背面画像プレビュー">
                    </div>

                    <div class="image-upload-section" id="leftSection">
                        <label class="upload-label">左側の画像</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="leftImage" accept="image/*">
                            <label for="leftImage" class="file-input-label">📁 画像を選択</label>
                        </div>
                        <img id="leftPreview" class="preview-image" alt="左側画像プレビュー">
                    </div>

                    <div class="image-upload-section" id="rightSection">
                        <label class="upload-label">右側の画像</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="rightImage" accept="image/*">
                            <label for="rightImage" class="file-input-label">📁 画像を選択</label>
                        </div>
                        <img id="rightPreview" class="preview-image" alt="右側画像プレビュー">
                    </div>
                </div>

                <div class="control-section" style="display: none;">
                    <h3>🔧 表示設定</h3>
                    
                    <div class="checkbox-container">
                        <input type="checkbox" id="wireframeMode">
                        <label for="wireframeMode">Tシャツワイヤーフレーム表示</label>
                    </div>
                    <div class="checkbox-container">
                        <input type="checkbox" id="showMeshInfo">
                        <label for="showMeshInfo">メッシュ情報表示</label>
                    </div>
                </div>

                <button class="reset-button" id="resetButton">🔄 リセット</button>
            </div>
        </div>
    </div>

    <!-- 画像クロップモーダル -->
    <div id="cropModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 15px; max-width: 600px; width: 90%;">
            <h3 style="margin-top: 0; color: #333;">📐 画像をクロップ</h3>
            <div style="position: relative; max-height: 400px; overflow: hidden; background: #f0f0f0; border-radius: 8px;">
                <canvas id="cropCanvas" style="max-width: 100%; display: block;"></canvas>
            </div>
            <div style="margin-top: 20px;">
                <label style="display: block; margin-bottom: 10px; color: #555;">画像サイズ: <span id="cropSize">100%</span></label>
                <input type="range" id="cropScale" min="50" max="200" value="100" style="width: 100%;">
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;">
                <button id="cropCancel" style="padding: 10px 20px; background: #ccc; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">キャンセル</button>
                <button id="cropConfirm" style="padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;">確定</button>
            </div>
        </div>
    </div>

    <script src="js/tshirt-simulator.js"></script>
</body>
</html>
